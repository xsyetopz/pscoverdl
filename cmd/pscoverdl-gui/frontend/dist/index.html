<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PSCoverDL</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <aside class="nav" aria-label="Emulator selection">
      <button id="duckstation-tab" class="nav-button" type="button" data-emulator="duckstation">
        <img src="./assets/ps1.png" alt="" />
        <span>DuckStation</span>
      </button>
      <button id="pcsx2-tab" class="nav-button" type="button" data-emulator="pcsx2">
        <img src="./assets/ps2.png" alt="" />
        <span>PCSX2</span>
      </button>
    </aside>

    <main class="panel">
      <form id="cover-form">
        <section class="form-page" data-page="duckstation" aria-label="DuckStation cover settings">
          <div class="field-row">
            <input id="duckstation-cover-directory" class="text-input" placeholder="Cover Directory" autocomplete="off" />
            <button class="secondary-button" type="button" data-browse="cover" data-emulator="duckstation">Browse</button>
          </div>
          <div class="field-row">
            <input id="duckstation-game-cache" class="text-input" placeholder="Game Cache" autocomplete="off" />
            <button class="secondary-button" type="button" data-browse="cache" data-emulator="duckstation">Browse</button>
          </div>
          <fieldset class="radio-group">
            <legend>Cover Type:</legend>
            <label><input type="radio" name="duckstation-cover-type" value="0" checked /> Default</label>
            <label><input type="radio" name="duckstation-cover-type" value="1" /> 3D</label>
          </fieldset>
          <label class="check-row"><input id="duckstation-use-ssl" type="checkbox" checked /> Use SSL</label>
          <label class="check-row"><input id="duckstation-fallback" type="checkbox" /> Fallback to other cover type if not found</label>
          <button class="primary-button" type="submit" data-start="duckstation">Start Download</button>
        </section>

        <section class="form-page" data-page="pcsx2" aria-label="PCSX2 cover settings" hidden>
          <div class="field-row">
            <input id="pcsx2-cover-directory" class="text-input" placeholder="Cover Directory" autocomplete="off" />
            <button class="secondary-button" type="button" data-browse="cover" data-emulator="pcsx2">Browse</button>
          </div>
          <div class="field-row">
            <input id="pcsx2-game-cache" class="text-input" placeholder="Game Cache" autocomplete="off" />
            <button class="secondary-button" type="button" data-browse="cache" data-emulator="pcsx2">Browse</button>
          </div>
          <fieldset class="radio-group">
            <legend>Cover Type:</legend>
            <label><input type="radio" name="pcsx2-cover-type" value="0" checked /> Default</label>
            <label><input type="radio" name="pcsx2-cover-type" value="1" /> 3D</label>
          </fieldset>
          <label class="check-row"><input id="pcsx2-use-ssl" type="checkbox" checked /> Use SSL</label>
          <label class="check-row"><input id="pcsx2-fallback" type="checkbox" /> Fallback to other cover type if not found</label>
          <button class="primary-button" type="submit" data-start="pcsx2">Start Download</button>
        </section>
      </form>
      <pre id="output" aria-live="polite"></pre>
    </main>
  </div>
  <script src="./main.js"></script>
</body>
</html>
