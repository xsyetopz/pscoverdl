name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.3)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            os: macos-15
            goos: darwin
            goarch: arm64
            archive: zip
            gui_tags: production
          - target: macos-x86_64
            os: macos-15-intel
            goos: darwin
            goarch: amd64
            archive: zip
            gui_tags: production
          - target: linux-x86_64
            os: ubuntu-24.04
            goos: linux
            goarch: amd64
            archive: tar
            gui_tags: production webkit2_41
          - target: linux-aarch64
            os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            archive: tar
            gui_tags: production webkit2_41
          - target: windows-x86_64
            os: windows-2025
            goos: windows
            goarch: amd64
            archive: zip
            ext: .exe
            gui_tags: production
          - target: windows-aarch64
            os: windows-11-arm
            goos: windows
            goarch: arm64
            archive: zip
            ext: .exe
            gui_tags: production

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build binaries
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
          GUI_TAGS: ${{ matrix.gui_tags }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          out="dist/pscoverdl-${TARGET}"
          mkdir -p "$out"
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "$out/pscoverdl${EXT:-}" ./cmd/pscoverdl
          CGO_ENABLED=1 go build -tags "$GUI_TAGS" -trimpath -ldflags "-s -w" -o "$out/pscoverdl-gui${EXT:-}" ./cmd/pscoverdl-gui

      - name: Package artifact
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          if [ "$ARCHIVE" = "zip" ]; then
            (cd dist && zip -r "../artifacts/pscoverdl-${TARGET}.zip" "pscoverdl-${TARGET}")
          else
            (cd dist && tar -czf "../artifacts/pscoverdl-${TARGET}.tar.gz" "pscoverdl-${TARGET}")
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pscoverdl-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error
          archive: false

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine version tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PSCoverDL ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
